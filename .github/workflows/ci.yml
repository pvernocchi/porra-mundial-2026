name: CI
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        php: ['8.3', '8.4']
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pdo, pdo_sqlite, openssl, mbstring, curl, sodium
          tools: composer:v2
      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ matrix.php }}-${{ hashFiles('composer.json') }}
      - name: Install (best-effort; tests run without vendor too)
        run: composer install --no-interaction --no-progress --prefer-dist || echo "composer install failed; continuing"
      - name: PHP syntax check
        run: |
          find app public tests -name '*.php' -print0 | xargs -0 -n1 php -l
      - name: PHPUnit
        run: |
          if [ -x vendor/bin/phpunit ]; then
            vendor/bin/phpunit
          else
            echo "PHPUnit not installed; skipping (composer install failed)."
          fi

  release-zip:
    needs: lint-and-test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
      - name: Install production deps
        run: composer install --no-dev --optimize-autoloader --no-interaction
      - name: Build release zip
        run: php bin/build-release.php
      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.zip
