name: Automated Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Tipo de versión (major, minor, patch)"
        required: true
        default: "patch"

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node (para semantic-release)
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependencias
        run: |
          npm install -g standard-version

      - name: Bump versión
        run: |
          standard-version --release-as ${{ github.event.inputs.bump }}

      - name: Obtener nueva versión
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Actualizar archivo VERSION
        run: |
          echo "${{ steps.version.outputs.version }}" > VERSION

      - name: Commit VERSION
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add VERSION
          git commit -m "Update VERSION to ${{ steps.version.outputs.version }}" || echo "No changes"

      - name: Push cambios
        run: |
          git push --follow-tags origin main

      - name: Crear release en GitHub
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.version.outputs.version }}"
          name: "v${{ steps.version.outputs.version }}"
          body_path: CHANGELOG.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
