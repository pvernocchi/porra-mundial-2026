<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600">

<!-- Blue stripe -->
<rect width="900" height="200" fill="#0099B5"/>
<!-- Red fimbriation -->
<rect y="200" width="900" height="16.7" fill="#CE1126"/>
<!-- White stripe -->
<rect y="216.7" width="900" height="166.6" fill="#FFFFFF"/>
<!-- Red fimbriation -->
<rect y="383.3" width="900" height="16.7" fill="#CE1126"/>
<!-- Green stripe -->
<rect y="400" width="900" height="200" fill="#1EB53A"/>

<!-- Crescent -->
<circle cx="200" cy="100" r="60" fill="#FFFFFF"/>
<circle cx="218" cy="100" r="50" fill="#0099B5"/>

<!-- 12 stars (3 rows: 3, 4, 5) -->
<!-- Row 1: 3 stars -->
<circle cx="300" cy="50" r="8" fill="#FFFFFF"/>
<circle cx="330" cy="50" r="8" fill="#FFFFFF"/>
<circle cx="360" cy="50" r="8" fill="#FFFFFF"/>
<!-- Row 2: 4 stars -->
<circle cx="285" cy="85" r="8" fill="#FFFFFF"/>
<circle cx="315" cy="85" r="8" fill="#FFFFFF"/>
<circle cx="345" cy="85" r="8" fill="#FFFFFF"/>
<circle cx="375" cy="85" r="8" fill="#FFFFFF"/>
<!-- Row 3: 5 stars -->
<circle cx="270" cy="120" r="8" fill="#FFFFFF"/>
<circle cx="300" cy="120" r="8" fill="#FFFFFF"/>
<circle cx="330" cy="120" r="8" fill="#FFFFFF"/>
<circle cx="360" cy="120" r="8" fill="#FFFFFF"/>
<circle cx="390" cy="120" r="8" fill="#FFFFFF"/>

</svg>
